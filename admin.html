<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMES STORE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',Arial,sans-serif}

 .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px;text-align:center;box-shadow:0 2px 20px rgba(0,0,0,0.5)}
 .header h1{color:#4d9fff;font-size:28px;font-weight:bold;letter-spacing:2px}

 .tabs{display:flex;gap:10px;padding:15px;background:#0f0f1a;justify-content:center}
 .tab{padding:12px 30px;background:#1a1a2e;border-radius:10px;cursor:pointer;font-weight:bold;border:2px solid transparent;transition:0.3s}
 .tab.active{background:#4d9fff;border-color:#4d9fff;color:#fff}
 .tab:hover{background:#2a2a4e}

 .container{max-width:1200px;margin:20px auto;padding:0 15px}
 .hidden{display:none}

 .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

 .game-card{background:#1a1a2e;border-radius:15px;overflow:hidden;border:1px solid #2a2a4e;transition:0.3s}
 .game-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(77,159,255,0.3);border-color:#4d9fff}

 .game-card img{width:100%;height:200px;object-fit:cover;background:#0a0a0f}

 .game-info{padding:15px}
 .game-category{display:inline-block;background:#ff3333;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:bold;margin-bottom:8px;text-transform:uppercase}

 .game-name{font-size:18px;font-weight:bold;color:#4d9fff;margin:8px 0;line-height:1.3}

 .game-desc{color:#aaa;font-size:14px;margin:10px 0;line-height:1.5;min-height:40px}

 .download-btn{display:block;width:100%;background:linear-gradient(135deg,#ff3333,#ff6666);color:#fff;padding:14px;margin:8px 0;border-radius:10px;text-decoration:none;font-weight:bold;text-align:center;border:none;cursor:pointer;transition:0.3s;font-size:15px;box-shadow:0 4px 15px rgba(255,51,51,0.3)}
 .download-btn:hover{background:linear-gradient(135deg,#ff5555,#ff8888);transform:scale(1.02);box-shadow:0 6px 20px rgba(255,51,51,0.5)}
 .download-btn:active{transform:scale(0.98)}

 .setting-box{margin-top:12px;padding:12px;background:#1a2a1a;border-left:3px solid #00ff88;border-radius:8px;font-size:13px}
 .setting-box b{color:#00ff88}
 .setting-link{display:inline-block;margin-top:8px;color:#00ff88;text-decoration:underline;font-weight:bold}

 .videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
 .video-card{background:#1a1a2e;border-radius:15px;overflow:hidden;border:1px solid #2a2a4e}
 .video-card iframe{width:100%;height:200px;border:none}
 .video-info{padding:15px}
 .video-title{font-size:16px;font-weight:bold;color:#4d9fff;margin-bottom:5px}
 .video-game{color:#ffaa33;font-size:13px;margin-bottom:8px}
 .video-desc{color:#aaa;font-size:13px;line-height:1.4}

 .empty-msg{text-align:center;color:#666;padding:80px 20px;font-size:18px}
</style>
</head>
<body>

<div class="header">
  <h1>GAMES STORE</h1>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('games')">GAMES</div>
  <div class="tab" onclick="showTab('videos')">VIDEOS</div>
</div>

<div class="container">
  <div id="gamesTab">
    <div id="gamesGrid" class="games-grid">
      <p class="empty-msg">Inapakia games...</p>
    </div>
  </div>

  <div id="videosTab" class="hidden">
    <div id="videosGrid" class="videos-grid">
      <p class="empty-msg">Bado hakuna videos.</p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAyz_E70mm8RbYmWGYdBu1TLuBqK4ipdgU",
  authDomain: "nova-ec213.firebaseapp.com",
  databaseURL: "https://nova-ec213-default-rtdb.firebaseio.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "303745079224",
  appId: "1:303745079224:web:b8b6be511ac128a7202cc1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// PASSWORD CHECK
if(!localStorage.getItem('siteAccess')){
  const code = prompt('Weka Code ya Ku ingia Site:');
  db.ref('siteCodes/' + code).once('value', snap => {
    if(snap.exists()){
      localStorage.setItem('siteAccess', 'true');
      db.ref('usedCodes/' + code).set(true);
      db.ref('siteCodes/' + code).remove();
      location.reload();
    } else {
      alert('Code si sahihi!');
      window.location = 'https://google.com';
    }
  });
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#gamesTab, #videosTab').forEach(t=>t.classList.add('hidden'));
  if(tab==='games'){
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('gamesTab').classList.remove('hidden');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('videosTab').classList.remove('hidden');
    loadVideos();
  }
}

const gamesGrid = document.getElementById('gamesGrid');
const videosGrid = document.getElementById('videosGrid');

// LOAD GAMES
db.ref('games').on('value', snap => {
  const data = snap.val() || {};
  gamesGrid.innerHTML = '';

  if(Object.keys(data).length === 0){
    gamesGrid.innerHTML = '<p class="empty-msg">Hakuna games bado. Admin apandishe kwanza.</p>';
    return;
  }

  Object.entries(data).reverse().forEach(([id, g]) => {
    // TENGENEZA BUTTONS ZA DOWNLOAD - DESIGN YA KISASA
    let linksHtml = '';
    if(g.links && g.links.length > 0){
      linksHtml = '<div style="margin-top:12px">';
      g.links.forEach(link => {
        linksHtml += `<a href="${link.url}" target="_blank" rel="noopener" class="download-btn">
          ⬇️ DOWNLOAD ${link.label.toUpperCase()}
        </a>`;
      });
      linksHtml += '</div>';
    }

    // SETTING BOX
    let settingHtml = '';
    if(g.setting && g.setting.text){
      settingHtml = `<div class="setting-box">
        <b>${g.setting.label || 'PASSWORD / SETTING'}:</b> ${g.setting.text}
        ${g.setting.link? `<br><a href="${g.setting.link}" target="_blank" class="setting-link">⬇️ Download Setting File</a>` : ''}
      </div>`;
    }

    const div = document.createElement('div');
    div.className = 'game-card';
    div.innerHTML = `
      <img src="${g.img}" alt="${g.name}" onerror="this.src='https://via.placeholder.com/400x200/1a1a2e/4d9fff?text=NO+IMAGE'">
      <div class="game-info">
        <div class="game-category">${g.category}</div>
        <div class="game-name">${g.name}</div>
        <div class="game-desc">${g.description || 'Hakuna maelezo'}</div>
        ${linksHtml}
        ${settingHtml}
      </div>
    `;
    gamesGrid.appendChild(div);
  });
});

// LOAD VIDEOS
function loadVideos(){
  db.ref('videos').on('value', snap => {
    const data = snap.val() || {};
    videosGrid.innerHTML = '';

    if(Object.keys(data).length === 0){
      videosGrid.innerHTML = '<p class="empty-msg">Bado hakuna videos.</p>';
      return;
    }

    Object.values(data).reverse().forEach(v => {
      const div = document.createElement('div');
      div.className = 'video-card';
      div.innerHTML = `
        <iframe src="https://www.youtube.com/embed/${v.videoId}" allowfullscreen></iframe>
        <div class="video-info">
          <div class="video-title">${v.title}</div>
          <div class="video-game">🎮 ${v.gameName}</div>
          <div class="video-desc">${v.description}</div>
        </div>
      `;
      videosGrid.appendChild(div);
    });
  });
}
</script>
</body>
</html>
