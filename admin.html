<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel Pro</title>
<style>
  body{background:#0a0a0a;color:#fff;font-family:Arial;padding:20px;max-width:1000px;margin:auto}
  .box{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:20px;border:1px solid #333}
  input,textarea,select{width:100%;padding:12px;margin:8px 0;background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:8px;box-sizing:border-box}
  button{background:#ff3333;color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-weight:bold;margin:5px}
  button:hover{background:#ff5555}
  .btn-edit{background:#ffaa00}
  .btn-save{background:#00cc44}
  .btn-cancel{background:#666}
  .link-box{background:#222;padding:12px;border-radius:8px;margin:8px 0;border-left:3px solid #ff3333}
  .game-item{background:#222;padding:15px;border-radius:8px;margin:10px 0;border:1px solid #333}
  .edit-mode{background:#2a2a00;border:2px solid #ffaa00}
  h2{color:#ff3333}
  .hidden{display:none}
</style>
</head>
<body>

<h1>🎮 ADMIN PANEL PRO</h1>

<div class="box">
  <h2>Tengeneza Code 1-Time</h2>
  <input type="text" id="newCode" placeholder="Andika code, mfano: VANNY2026">
  <button onclick="createCode()">Tengeneza Code</button>
  <p>Codes Active: <span id="activeCount">0</span> | Zimetumika: <span id="usedCount">0</span></p>
</div>

<div class="box">
  <h2>🎮 Ongeza/Edit Game</h2>
  <input type="hidden" id="editId">
  <input type="text" id="gName" placeholder="Jina la Game: EFOOTBALL PES2026">
  <input type="text" id="gImg" placeholder="Link ya Picha ya Game">
  
  <select id="gCat" onchange="checkOtherCat()">
    <option value="">Chagua Category</option>
    <option value="ANDROID GAME">ANDROID GAME</option>
    <option value="PC GAME">PC GAME</option>
    <option value="PS4/PS5">PS4/PS5</option>
    <option value="XBOX">XBOX</option>
    <option value="PPSSPP">PPSSPP</option>
    <option value="other">Other - Andika Mwenyewe</option>
  </select>
  <input type="text" id="gCatOther" placeholder="Andika Category Mwenyewe" class="hidden">
  
  <textarea id="gDesc" placeholder="Maelezo ya Game + Game Size: 1.7GB No Password" rows="3"></textarea>
  
  <h3 style="color:#ffaa33;margin-top:15px">Links 5 Fixed - Jaza Ambazo Unahitaji</h3>
  
  <div class="link-box">
    <b>1. APK / GAME</b>
    <input type="text" id="link1Label" placeholder="Lebo: APK, GAME" value="APK">
    <input type="text" id="link1Url" placeholder="Weka link ya APK/GAME">
  </div>
  
  <div class="link-box">
    <b>2. OBB / DATA</b>
    <input type="text" id="link2Label" placeholder="Lebo: OBB, DATA" value="OBB">
    <input type="text" id="link2Url" placeholder="Weka link ya OBB/DATA">
  </div>
  
  <div class="link-box">
    <b>3. DATA / SAVEDATA</b>
    <input type="text" id="link3Label" placeholder="Lebo: DATA, SAVEDATA" value="DATA">
    <input type="text" id="link3Url" placeholder="Weka link ya DATA/SAVEDATA">
  </div>
  
  <div class="link-box">
    <b>4. TEXTURES</b>
    <input type="text" id="link4Label" placeholder="Lebo: TEXTURES" value="TEXTURES">
    <input type="text" id="link4Url" placeholder="Weka link ya TEXTURES">
  </div>
  
  <div class="link-box">
    <b>5. CAMERA / NYINGINE</b>
    <input type="text" id="link5Label" placeholder="Lebo: CAMERA, PATCH" value="CAMERA">
    <input type="text" id="link5Url" placeholder="Weka link ya CAMERA/NYINGINE">
  </div>
  
  <button onclick="saveGame()" id="saveBtn">Pandisha Game</button>
  <button onclick="cancelEdit()" id="cancelBtn" class="btn-cancel hidden">Ghairi Edit</button>
</div>

<div class="box">
  <h2>📋 Games Zote - Bonyeza Edit Kurekebisha</h2>
  <div id="gameList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAyz_E70mm8RbYmWGYdBu1TLuBqK4ipdgU",
  authDomain: "nova-ec213.firebaseapp.com",
  databaseURL: "https://nova-ec213-default-rtdb.firebaseio.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "303745079224",
  appId: "1:303745079224:web:b8b6be511ac128a7202cc1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// PASSWORD
if(sessionStorage.getItem('adminAuth') !== 'true'){
  let key = prompt('Weka Admin Key:');
  if(key === '2026mwena'){
    sessionStorage.setItem('adminAuth','true');
  } else {
    alert('Key si sahihi!');
    window.location = 'index.html';
  }
}

function checkOtherCat(){
  document.getElementById('gCatOther').classList.toggle('hidden', 
    document.getElementById('gCat').value !== 'other');
}

// CODES
function createCode(){
  const code = document.getElementById('newCode').value.trim().toUpperCase();
  if(!code){ alert('Andika code kwanza'); return; }
  db.ref('siteCodes/' + code).set(true);
  document.getElementById('newCode').value = '';
  alert('Code ' + code + ' imetengenezwa!');
}

db.ref('siteCodes').on('value', snap => {
  document.getElementById('activeCount').textContent = snap.numChildren();
});
db.ref('usedCodes').on('value', snap => {
  document.getElementById('usedCount').textContent = snap.numChildren();
});

// SAVE/EDIT GAME
function saveGame(){
  const id = document.getElementById('editId').value || Date.now();
  const name = document.getElementById('gName').value.trim();
  const img = document.getElementById('gImg').value.trim();
  let cat = document.getElementById('gCat').value;
  if(cat === 'other') cat = document.getElementById('gCatOther').value.trim();
  const desc = document.getElementById('gDesc').value.trim();
  
  if(!name || !img || !cat || !desc){
    alert('Jaza Jina, Picha, Category na Maelezo vyote');
    return;
  }
  
  // Kusanya links 5
  const links = [];
  for(let i=1; i<=5; i++){
    const label = document.getElementById('link' + i + 'Label').value.trim();
    const url = document.getElementById('link' + i + 'Url').value.trim();
    if(label && url){
      links.push({label: label, url: url});
    }
  }
  
  db.ref('games/' + id).set({name, img, category: cat, description: desc, links});
  
  alert(document.getElementById('editId').value ? 'Game ime-update!' : 'Game imepandishwa!');
  clearForm();
}

function clearForm(){
  document.getElementById('editId').value = '';
  document.getElementById('gName').value = '';
  document.getElementById('gImg').value = '';
  document.getElementById('gCat').value = '';
  document.getElementById('gCatOther').value = '';
  document.getElementById('gDesc').value = '';
  for(let i=1; i<=5; i++){
    document.getElementById('link' + i + 'Url').value = '';
  }
  document.getElementById('saveBtn').textContent = 'Pandisha Game';
  document.getElementById('cancelBtn').classList.add('hidden');
}

function cancelEdit(){
  clearForm();
}

// EDIT GAME
function editGame(id, game){
  document.getElementById('editId').value = id;
  document.getElementById('gName').value = game.name;
  document.getElementById('gImg').value = game.img;
  
  if(['ANDROID GAME','PC GAME','PS4/PS5','XBOX','PPSSPP'].includes(game.category)){
    document.getElementById('gCat').value = game.category;
    document.getElementById('gCatOther').classList.add('hidden');
  } else {
    document.getElementById('gCat').value = 'other';
    document.getElementById('gCatOther').classList.remove('hidden');
    document.getElementById('gCatOther').value = game.category;
  }
  
  document.getElementById('gDesc').value = game.description;
  
  // Jaza links 5
  for(let i=1; i<=5; i++){
    if(game.links && game.links[i-1]){
      document.getElementById('link' + i + 'Label').value = game.links[i-1].label;
      document.getElementById('link' + i + 'Url').value = game.links[i-1].url;
    } else {
      document.getElementById('link' + i + 'Url').value = '';
    }
  }
  
  document.getElementById('saveBtn').textContent = 'Update Game';
  document.getElementById('cancelBtn').classList.remove('hidden');
  window.scrollTo(0,0);
}

// LIST GAMES
db.ref('games').on('value', snap => {
  const data = snap.val() || {};
  let html = '';
  Object.entries(data).reverse().forEach(([id, g]) => {
    const linkCount = g.links ? g.links.length : 0;
    html += `<div class="game-item">
      <b>${g.name}</b> - ${g.category} [${linkCount} links]<br>
      <small style="color:#aaa">${g.description.substring(0,50)}...</small><br>
      <button class="btn-edit" onclick='editGame("${id}", ${JSON.stringify(g).replace(/'/g,"&#39;")})'>✏️ Edit</button>
      <button onclick="if(confirm('Futa game hii?')) db.ref('games/${id}').remove()">🗑️ Futa</button>
    </div>`;
  });
  document.getElementById('gameList').innerHTML = html || 'Hakuna games bado';
});
</script>
</body>
</html>
