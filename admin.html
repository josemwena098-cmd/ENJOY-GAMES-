<body class="admin-body">

<header class="admin-header">
  <h1>⚙️ ADMIN PANEL</h1>
</header>

<div class="admin-container">
  <!-- TENGENEZA CODE -->
  <div class="admin-card">
    <h3>🔑 Tengeneza Code 1-Time</h3>
    <input type="text" id="newCode" placeholder="Andika code, mfano: CODE123">
    <button id="genCodeBtn">Tengeneza Code</button>
    <div class="stats">
      <p>Codes Active: <span id="activeCodes">0</span></p>
      <p>Zimetumika: <span id="usedCodes">0</span></p>
    </div>
    <div id="codesList"></div>
  </div>

  <!-- UPLOAD GAME -->
  <div class="admin-card">
    <h3>🎮 Ongeza Game</h3>
    <form id="uploadForm">
      <input type="text" id="gameName" placeholder="Jina la Game" required>
      <input type="text" id="gameImage" placeholder="Link ya Picha" required>
      <select id="gameCategory" required>
        <option value="">Chagua Category</option>
        <option value="PC GAME">PC GAME</option>
        <option value="MOBILE GAME">MOBILE GAME</option>
        <option value="PPSSPP">PPSSPP</option>
        <option value="PS2">PS2</option>
      </select>
      <textarea id="gameDesc" placeholder="Maelezo ya Game"></textarea>
      
      <div id="singleLink">
        <input type="text" id="gameUrl" placeholder="Link ya Download/Play">
      </div>
      
      <div id="multiLinks" class="hidden">
        <input type="text" id="gameUrl1" placeholder="Download 1">
        <input type="text" id="gameUrl2" placeholder="Download 2">
        <input type="text" id="gameUrl3" placeholder="Download 3">
      </div>
      
      <button type="submit">Pandisha Game</button>
    </form>
  </div>

  <!-- UPLOAD VIDEO YOUTUBE -->
  <div class="admin-card">
    <h3>📺 Ongeza Video Ya YouTube</h3>
    <form id="videoForm">
      <input type="text" id="videoTitle" placeholder="Title ya Video" required>
      <textarea id="videoDesc" placeholder="Maelezo ya Video"></textarea>
      <input type="text" id="videoLink" placeholder="Weka Link ya YouTube, mfano: https://youtube.com/watch?v=XXXX" required>
      <button type="submit">Pandisha Video</button>
    </form>
  </div>
</div>

<script src="script.js"></script>
</body>
