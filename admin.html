<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#fff;font-family:Arial,sans-serif;padding:20px}
 .container{max-width:800px;margin:0 auto}
 .header{text-align:center;margin-bottom:30px}
 .header h1{color:#4d9fff;font-size:28px}

 .tabs{display:flex;gap:10px;margin-bottom:20px}
 .tab-btn{flex:1;padding:12px;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:10px;cursor:pointer;font-weight:bold}
 .tab-btn.active{background:#4d9fff;border-color:#4d9fff}

 .section{background:#1a1a2e;padding:20px;border-radius:15px;border:1px solid #2a2a4e;margin-bottom:20px}
 .section h2{color:#4d9fff;margin-bottom:15px;font-size:20px}

  input,textarea,select{width:100%;padding:12px;margin:8px 0;background:#0a0a0f;border:1px solid #2a2a4e;border-radius:8px;color:#fff;font-size:14px}
  textarea{min-height:80px;resize:vertical}

 .link-group{border:1px solid #333;padding:12px;border-radius:8px;margin:10px 0;background:#0f0f1a}
 .btn{background:#4d9fff;color:#fff;padding:12px 25px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;margin:5px}
 .btn-danger{background:#ff3333}
 .btn-small{padding:8px 15px;font-size:13px}

 .hidden{display:none}
 .game-item{background:#0a0a0f;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #2a2a4e;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎮 ADMIN PANEL</h1>
    <p style="color:#666;margin-top:5px">Admin Key: 2026mwena</p>
  </div>

  <div class="tabs">
    <div class="tab-btn active" onclick="showSection('game')">ADD GAME</div>
    <div class="tab-btn" onclick="showSection('video')">ADD VIDEO</div>
    <div class="tab-btn" onclick="showSection('list')">MANAGE</div>
  </div>

  <!-- ADD GAME SECTION -->
  <div id="gameSection" class="section">
    <h2>➕ Ongeza Game Mpya</h2>
    <input type="text" id="gName" placeholder="Jina la Game: Tanzania Traffic Bus">
    <select id="gCat">
      <option>ANDROID GAME</option>
      <option>PC GAME</option>
      <option>PS4/PS5</option>
    </select>
    <input type="text" id="gImg" placeholder="Link ya Picha: https://i.imgur.com/xxx.jpg">
    <textarea id="gDesc" placeholder="Maelezo ya Game..."></textarea>

    <h3 style="margin-top:15px;color:#aaa">Download Links</h3>
    <div id="linksBox"></div>
    <button class="btn btn-small" onclick="addLink()">+ Ongeza Link Nyingine</button>

    <h3 style="margin-top:15px;color:#aaa">Password / Setting</h3>
    <input type="text" id="sLabel" placeholder="Label: PASSWORD">
    <input type="text" id="sText" placeholder="Password: JUMA2029">
    <input type="text" id="sLink" placeholder="Link ya Setting File: https://...">

    <button class="btn" onclick="saveGame()">💾 Hifadhi Game</button>
  </div>

  <!-- ADD VIDEO SECTION - HII NDIO ILIKUWA HAIJAWASHA -->
  <div id="videoSection" class="section hidden">
    <h2>🎬 Ongeza Video ya YouTube</h2>
    <input type="text" id="vTitle" placeholder="Title ya Video: Gameplay Tanzania Bus">
    <input type="text" id="vGame" placeholder="Jina la Game husika">
    <input type="text" id="vYoutube" placeholder="Link ya YouTube: https://youtube.com/watch?v=xxxxx">
    <textarea id="vDesc" placeholder="Maelezo mafupi ya video..."></textarea>
    <button class="btn" onclick="saveVideo()">💾 Hifadhi Video</button>
  </div>

  <!-- MANAGE SECTION -->
  <div id="listSection" class="section hidden">
    <h2>📦 Games Zilizopo</h2>
    <div id="gamesList">Inapakia...</div>

    <h2 style="margin-top:30px">🎬 Videos Zilizopo</h2>
    <div id="videosList">Inapakia...</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAyz_E70mm8RbYmWGYdBu1TLuBqK4ipdgU",
  authDomain: "nova-ec213.firebaseapp.com",
  databaseURL: "https://nova-ec213-default-rtdb.firebaseio.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "303745079224",
  appId: "1:303745079224:web:b8b6be511ac128a7202cc1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADMIN KEY CHECK
if(prompt('Weka Admin Key:')!== '2026mwena'){
  alert('Key si sahihi!');
  window.location = 'index.html';
}

function showSection(sec){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('#gameSection, #videoSection, #listSection').forEach(s=>s.classList.add('hidden'));

  if(sec==='game'){
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('gameSection').classList.remove('hidden');
  } else if(sec==='video'){
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('videoSection').classList.remove('hidden');
  } else {
    document.querySelectorAll('.tab-btn')[2].classList.add('active');
    document.getElementById('listSection').classList.remove('hidden');
    loadList();
  }
}

let linkCount = 0;
function addLink(){
  linkCount++;
  document.getElementById('linksBox').innerHTML += `
    <div class="link-group" id="link${linkCount}">
      <input type="text" placeholder="Label: APK" id="label${linkCount}">
      <input type="text" placeholder="URL ya Download" id="url${linkCount}">
      <button class="btn btn-danger btn-small" onclick="document.getElementById('link${linkCount}').remove()">Tuma</button>
    </div>
  `;
}
addLink();

function saveGame(){
  const name = document.getElementById('gName').value;
  const cat = document.getElementById('gCat').value;
  const img = document.getElementById('gImg').value;
  const desc = document.getElementById('gDesc').value;

  if(!name ||!img){alert('Jaza jina na picha!');return;}

  let links = [];
  for(let i=1;i<=linkCount;i++){
    const l = document.getElementById('label'+i);
    const u = document.getElementById('url'+i);
    if(l && u && l.value && u.value){
      links.push({label:l.value, url:u.value});
    }
  }

  const setting = {
    label: document.getElementById('sLabel').value || 'PASSWORD',
    text: document.getElementById('sText').value,
    link: document.getElementById('sLink').value
  };

  db.ref('games').push({
    name, category:cat, img, description:desc, links, setting, time:Date.now()
  }).then(()=>{
    alert('✅ Game imehifadhiwa!');
    location.reload();
  });
}

function saveVideo(){
  const title = document.getElementById('vTitle').value;
  const gameName = document.getElementById('vGame').value;
  const youtube = document.getElementById('vYoutube').value;
  const desc = document.getElementById('vDesc').value;

  if(!title ||!youtube){alert('Jaza title na link ya YouTube!');return;}

  // Toa video ID kutoka YouTube link
  const videoId = youtube.split('v=')[1]?.split('&')[0] || youtube.split('/').pop();

  db.ref('videos').push({
    title, gameName, videoId, description:desc, time:Date.now()
  }).then(()=>{
    alert('✅ Video imehifadhiwa!');
    document.getElementById('vTitle').value = '';
    document.getElementById('vGame').value = '';
    document.getElementById('vYoutube').value = '';
    document.getElementById('vDesc').value = '';
  });
}

function loadList(){
  // Load Games
  db.ref('games').on('value', snap => {
    const data = snap.val() || {};
    let html = '';
    Object.entries(data).reverse().forEach(([id,g])=>{
      html += `<div class="game-item">
        <span>${g.name} - ${g.category}</span>
        <button class="btn btn-danger btn-small" onclick="delGame('${id}')">Delete</button>
      </div>`;
    });
    document.getElementById('gamesList').innerHTML = html || 'Hakuna games';
  });

  // Load Videos
  db.ref('videos').on('value', snap => {
    const data = snap.val() || {};
    let html = '';
    Object.entries(data).reverse().forEach(([id,v])=>{
      html += `<div class="game-item">
        <span>${v.title} - ${v.gameName}</span>
        <button class="btn btn-danger btn-small" onclick="delVideo('${id}')">Delete</button>
      </div>`;
    });
    document.getElementById('videosList').innerHTML = html || 'Hakuna videos';
  });
}

function delGame(id){
  if(confirm('Una uhakika?')) db.ref('games/'+id).remove();
}
function delVideo(id){
  if(confirm('Una uhakika?')) db.ref('videos/'+id).remove();
}
</script>
</body>
</html>
