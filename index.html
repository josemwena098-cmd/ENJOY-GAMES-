<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENJOY GAMES</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:90%;
    max-width:400px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
    color:#00e5ff;
    margin-bottom:10px;
}

p{
    margin-bottom:20px;
    opacity:.8;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00e5ff;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

#welcome{
    display:none;
}

.games{
    margin-top:20px;
}

.game{
    background:#0ea5e9;
    padding:12px;
    border-radius:10px;
    margin:10px 0;
}
</style>
</head>
<body>

<div class="container">

<div id="login">
    <h1>🎮 ENJOY GAMES</h1>
    <p>Weka namba yako ya simu kuingia.</p>

    <input type="tel" id="phone" placeholder="Mfano: 07XXXXXXXX">
    <button onclick="login()">INGIA SASA</button>
</div>

<div id="welcome">
    <h1>Karibu ENJOY GAMES</h1>
    <p id="userPhone"></p>

    <div class="games">
        <div class="game">🎮 Game Slot 1</div>
        <div class="game">🎮 Game Slot 2</div>
        <div class="game">🎮 Game Slot 3</div>
    </div>

    <button onclick="logout()">TOKA</button>
</div>

</div>

<script>
function login() {
    let phone = document.getElementById("phone").value;

    if(phone.length < 10){
        alert("Weka namba sahihi ya simu");
        return;
    }

    localStorage.setItem("userPhone", phone);

    document.getElementById("login").style.display = "none";
    document.getElementById("welcome").style.display = "block";
    document.getElementById("userPhone").innerText = "Namba: " + phone;
}

function logout(){
    localStorage.removeItem("userPhone");
    location.reload();
}

window.onload = function(){
    let saved = localStorage.getItem("userPhone");

    if(saved){
        document.getElementById("login").style.display = "none";
        document.getElementById("welcome").style.display = "block";
        document.getElementById("userPhone").innerText = "Namba: " + saved;
    }
}
</script>

</body>
</html>
