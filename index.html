<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENJOY GAMES</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading ENJOY GAMES...</p>
</div>

<!-- Login Screen -->
<div id="authScreen" class="hidden">
  <div class="auth-box">
    <h1>ENJOY<span>GAMES</span></h1>
    <p id="authSub">Ingia kuendelea</p>
    
    <div id="emailAuth">
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <input type="password" id="password" placeholder="Password">
      <button class="btn-primary" id="authBtn">Login</button>
      <button class="btn-ghost" id="switchMode">Huna akaunti? Jisajili</button>
    </div>

    <div class="divider">AU</div>
    
    <button class="btn-phone" id="phoneBtn">Ingia na Namba ya Simu</button>
    
    <div id="phoneAuth" class="hidden">
      <input type="tel" id="phone" placeholder="+2557XXXXXXXX">
      <div id="recaptcha-container"></div>
      <button class="btn-primary" id="sendOtpBtn">Tuma OTP</button>
      
      <div id="otpSection" class="hidden">
        <input type="text" id="otp" placeholder="Weka OTP">
        <button class="btn-primary" id="verifyOtpBtn">Thibitisha</button>
      </div>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="appScreen" class="hidden">
  <nav>
    <div class="logo">ENJOY<span>GAMES</span></div>
    <div class="nav-links">
      <a href="#" data-page="home" class="nav-link active">Home</a>
      <a href="#" data-page="apk" class="nav-link">APK</a>
      <a href="#" data-page="ppsspp" class="nav-link">PPSSPP Gold</a>
      <a href="#" data-page="ps2" class="nav-link">PS2</a>
      <a href="#" data-page="admin" class="nav-link admin-only hidden">Admin Upload</a>
    </div>
    <div class="nav-right">
      <span id="userEmail"></span>
      <button class="btn-sm" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main id="pageContent"></main>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
