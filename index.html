<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,sans-serif}
body{background:#121212;color:#e0e0e0;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.login-card{background:#1e1e1e;padding:32px;border-radius:12px;width:100%;max-width:380px;border:1px solid #333}
.login-card h2{text-align:center;margin-bottom:8px;color:#8ab4f8;font-size:24px}
.login-card p{text-align:center;color:#aaa;font-size:13px;margin-bottom:20px}
.login-card input{width:100%;padding:12px;margin-bottom:12px;background:#2d2d2d;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:14px}
.login-card button{width:100%;padding:12px;background:#1a73e8;color:white;border:none;border-radius:8px;font-weight:500;cursor:pointer;margin-top:6px}
.toggle{color:#8ab4f8;text-align:center;margin-top:16px;font-size:13px;cursor:pointer}
.toggle:hover{text-decoration:underline}
.msg{text-align:center;margin-top:12px;font-size:13px;min-height:20px}
.success{color:#81c995}
.error{color:#f28b82}

/* App styles - cards ndogo kama Play Store */
nav{background:#1e1e1e;padding:12px 16px;border-bottom:1px solid #333;position:sticky;top:0}
.nav-wrap{max-width:1200px;margin:auto;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
nav h2{color:#8ab4f8;font-size:20px}
.tabs{display:flex;gap:4px;flex-wrap:wrap}
.tab{padding:8px 12px;border-radius:20px;cursor:pointer;color:#b3b3b3;font-size:13px}
.tab.active{background:#2d2d2d;color:#8ab4f8}
.logout{background:#d93025;border:none;color:white;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px}

.container{max-width:1200px;margin:20px auto;padding:0 12px}
.page{display:none}
.page.active{display:block}
.page h1{font-size:22px;margin-bottom:6px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:20px}
.card{background:#1e1e1e;border-radius:12px;overflow:hidden}
.card img{width:100%;height:140px;object-fit:cover}
.card-body{padding:8px}
.card h3{font-size:13px;font-weight:500;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .size{font-size:11px;color:#81c995;margin-bottom:4px}
.card p{font-size:11px;color:#aaa;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;margin-bottom:6px;min-height:26px}
.download-btn{display:block;background:#1a73e8;color:white;padding:6px;border-radius:6px;text-decoration:none;font-size:12px;text-align:center}

.admin-form{background:#1e1e1e;padding:20px;border-radius:12px;margin-bottom:20px}
.admin-form input,.admin-form textarea,.admin-form select{width:100%;padding:10px;margin-bottom:10px;background:#2d2d2d;border:1px solid #444;border-radius:8px;color:#e0e0e0;font-size:13px}

@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- LOGIN/SIGNUP -->
<div id="auth-page">
  <div class="login-wrap">
    <div class="login-card">
      <h2 id="title">Ingia Nova Hub</h2>
      <p id="subtitle">Pakua PS2, PPSSPP na APK</p>
      <input type="email" id="email" placeholder="Email yako">
      <input type="password" id="password" placeholder="Password min 6 herufi">
      <button onclick="handleAuth()" id="btn">Ingia</button>
      <div class="toggle" onclick="toggleMode()" id="toggle">Huna account? Jisajili hapa</div>
      <div id="msg" class="msg"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <nav>
    <div class="nav-wrap">
      <h2>Nova Hub</h2>
      <div class="tabs">
        <div class="tab active" onclick="showPage('home',this)">Home</div>
        <div class="tab" onclick="showPage('ps2',this)">PS2</div>
        <div class="tab" onclick="showPage('ppsspp',this)">PPSSPP</div>
        <div class="tab" onclick="showPage('apk',this)">APK</div>
        <div class="tab" onclick="showPage('admin',this)" id="admin-link" style="display:none">Admin</div>
      </div>
      <button class="logout" onclick="logout()">Toka</button>
    </div>
  </nav>

  <div class="container">
    <div id="home" class="page active"><h1>Karibu</h1><div id="recent" class="grid"></div></div>
    <div id="ps2" class="page"><h1>PS2 Games</h1><div id="ps2g" class="grid"></div></div>
    <div id="ppsspp" class="page"><h1>PPSSPP</h1><div id="ppsppg" class="grid"></div></div>
    <div id="apk" class="page"><h1>APK</h1><div id="apkg" class="grid"></div></div>
    
    <div id="admin" class="page">
      <h1>Admin</h1>
      <div class="admin-form">
        <select id="cat"><option value="ps2">PS2</option><option value="ppsspp">PPSSPP</option><option value="apk">APK</option></select>
        <input id="title" placeholder="Jina">
        <input id="size" placeholder="Size mf: 660MB">
        <textarea id="desc" rows="2" placeholder="Maelezo"></textarea>
        <input id="img" placeholder="Link ya picha">
        <input id="link" placeholder="Link ya download">
        <button onclick="upload()">Upload</button>
        <div id="upmsg" class="msg"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9SvoHhndN-j-Sl59qcdcDwHwB22UupvU",
  authDomain: "nova-ec213.firebaseapp.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "978338235926",
  appId: "1:978338235926:web:6193ea73d8fcc8ded89737"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const ADMIN = "josemwena098@gmail.com";
let isLogin = true;
let userEmail = "";

onAuthStateChanged(auth, u=>{
  if(u){
    userEmail = u.email;
    document.getElementById('auth-page').style.display='none';
    document.getElementById('app').style.display='block';
    if(u.email===ADMIN) document.getElementById('admin-link').style.display='block';
    load();
  }else{
    document.getElementById('auth-page').style.display='block';
    document.getElementById('app').style.display='none';
  }
});

window.toggleMode = ()=>{
  isLogin = !isLogin;
  document.getElementById('title').textContent = isLogin ? 'Ingia Nova Hub' : 'Jisajili Nova Hub';
  document.getElementById('btn').textContent = isLogin ? 'Ingia' : 'Jisajili';
  document.getElementById('toggle').textContent = isLogin ? 'Huna account? Jisajili hapa' : 'Una account? Ingia hapa';
  document.getElementById('msg').textContent = '';
}

window.handleAuth = async ()=>{
  const e = document.getElementById('email').value.trim();
  const p = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  
  if(!e || p.length<6){msg.textContent='Jaza email na password 6+';msg.className='msg error';return}
  
  try{
    if(isLogin) await signInWithEmailAndPassword(auth,e,p);
    else await createUserWithEmailAndPassword(auth,e,p);
    msg.textContent=''; 
  }catch(err){
    msg.textContent = isLogin ? 'Email/password si sahihi' : 'Email tayari imetumika';
    msg.className = 'msg error';
  }
}

window.logout = ()=>signOut(auth);
window.showPage = (id,el)=>{
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
}

window.upload = async ()=>{
  if(userEmail!==ADMIN) return alert('Si admin');
  const data = {
    cat:document.getElementById('cat').value,
    title:document.getElementById('title').value,
    size:document.getElementById('size').value,
    desc:document.getElementById('desc').value,
    img:document.getElementById('img').value,
    link:document.getElementById('link').value,
    time:Date.now()
  };
  if(!data.title || !data.link) return document.getElementById('upmsg').textContent='Jaza jina na link';
  await addDoc(collection(db,'items'),data);
  document.getElementById('upmsg').textContent='Imewekwa!';
  document.getElementById('upmsg').className='msg success';
  ['title','size','desc','img','link'].forEach(id=>document.getElementById(id).value='');
  load();
  setTimeout(()=>document.getElementById('upmsg').textContent='',2000);
}

async function load(){
  const q = query(collection(db,'items'),orderBy('time','desc'));
  const snap = await getDocs(q);
  const all = [];
  snap.forEach(d=>all.push(d.data()));
  
  render(all,'recent');
  render(all.filter(x=>x.cat=='ps2'),'ps2g');
  render(all.filter(x=>x.cat=='ppsspp'),'ppsppg');
  render(all.filter(x=>x.cat=='apk'),'apkg');
}

function render(arr,id){
  const box = document.getElementById(id);
  if(arr.length==0){box.innerHTML='<div style="padding:40px;text-align:center;color:#666">Hakuna vitu bado</div>';return}
  box.innerHTML = arr.map(x=>`
    <div class="card">
      <img src="${x.img||'https://via.placeholder.com/150x140/1e1e1e/666'}">
      <div class="card-body">
        <h3>${x.title}</h3>
        <div class="size">${x.size||'N/A'}</div>
        <p>${x.desc||''}</p>
        <a href="${x.link}" target="_blank" class="download-btn">Pakua</a>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
