<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMES STORE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',Arial,sans-serif}

.header{padding:25px 15px;text-align:center;background:#0a0a0f}
.header h1{font-size:26px;font-weight:bold;background:linear-gradient(90deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.tabs{display:flex;gap:10px;padding:15px;justify-content:center}
.tab{padding:10px 35px;background:#1a1a2e;border-radius:25px;cursor:pointer;font-weight:bold;border:1px solid #2a2a4e;transition:0.3s;font-size:15px}
.tab.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

.container{max-width:500px;margin:0 auto;padding:0 15px}
.hidden{display:none}

.games-grid{display:grid;grid-template-columns:1fr;gap:18px}

.game-card{background:#111827;border-radius:15px;overflow:hidden;border:1px solid #1f2937}
.game-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.5)}

.game-img-wrap{position:relative}
.game-card img{width:100%;height:180px;object-fit:cover;display:block}

.game-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,0.7);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:bold;text-transform:uppercase}

.game-info{padding:14px}
.game-name{font-size:16px;font-weight:bold;color:#fff;margin-bottom:8px}
.game-desc{color:#9ca3af;font-size:13px;margin:8px 0;min-height:35px}

/* BUTTON GLASSY KAMA VANNY */
.download-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:12px;margin:8px 0;border-radius:12px;text-decoration:none;font-weight:bold;text-align:center;cursor:pointer;transition:0.3s;font-size:14px}
.download-btn:hover{background:rgba(255,255,255,0.15)}

.setting-box{margin-top:12px;padding:12px;background:rgba(0,255,136,0.1);border-left:3px solid #00ff88;border-radius:8px;font-size:13px;color:#00ff88}
.setting-box b{color:#00ff88}

.videos-grid{display:grid;grid-template-columns:1fr;gap:18px}
.video-card{background:#111827;border-radius:15px;overflow:hidden;border:1px solid #1f2937}
.video-card iframe{width:100%;height:200px;border:none}
.video-info{padding:14px}
.video-title{font-size:16px;font-weight:bold;color:#fff;margin-bottom:5px}
.video-game{color:#fbbf24;font-size:13px;margin-bottom:8px}
.video-desc{color:#9ca3af;font-size:13px}

.empty-msg{text-align:center;color:#666;padding:60px 20px;font-size:16px}
</style>
</head>
<body>

<div class="header">
  <h1>🎮 GAMES STORE</h1>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('games')">GAMES</div>
  <div class="tab" onclick="showTab('videos')">VIDEOS</div>
</div>

<div class="container">
  <div id="gamesTab">
    <div id="gamesGrid" class="games-grid">
      <p class="empty-msg">Inapakia games...</p>
    </div>
  </div>

  <div id="videosTab" class="hidden">
    <div id="videosGrid" class="videos-grid">
      <p class="empty-msg">Bado hakuna videos.</p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAyz_E70mm8RbYmWGYdBu1TLuBqK4ipdgU",
  authDomain: "nova-ec213.firebaseapp.com",
  databaseURL: "https://nova-ec213-default-rtdb.firebaseio.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "303745079224",
  appId: "1:303745079224:web:b8b6be511ac128a7202cc1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// PASSWORD
if(!localStorage.getItem('siteAccess')){
  const code = prompt('🔑 Weka Code ya Ku ingia Site:');
  db.ref('siteCodes/' + code).once('value', snap => {
    if(snap.exists()){
      localStorage.setItem('siteAccess', 'true');
      db.ref('usedCodes/' + code).set(true);
      db.ref('siteCodes/' + code).remove();
      location.reload();
    } else {
      alert('❌ Code si sahihi!');
      window.location = 'https://google.com';
    }
  });
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#gamesTab, #videosTab').forEach(t=>t.classList.add('hidden'));
  if(tab==='games'){
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('gamesTab').classList.remove('hidden');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('videosTab').classList.remove('hidden');
    loadVideos();
  }
}

const gamesGrid = document.getElementById('gamesGrid');
const videosGrid = document.getElementById('videosGrid');

// LOAD GAMES
db.ref('games').on('value', snap => {
  const data = snap.val() || {};
  gamesGrid.innerHTML = '';
  if(Object.keys(data).length === 0){
    gamesGrid.innerHTML = '<p class="empty-msg">📦 Hakuna games bado.</p>';
    return;
  }
  Object.entries(data).reverse().forEach(([id, g]) => {
    let linksHtml = '';
    if(g.links && g.links.length > 0){
      linksHtml = '<div style="margin-top:12px">';
      g.links.forEach(link => {
        linksHtml += `<a href="${link.url}" target="_blank" class="download-btn">⬇️ DOWNLOAD ${link.label.toUpperCase()}</a>`;
      });
      linksHtml += '</div>';
    }
    let settingHtml = '';
    if(g.setting && g.setting.text){
      settingHtml = `<div class="setting-box">🔐 <b>PASSWORD:</b> ${g.setting.text}</div>`;
    }
    gamesGrid.innerHTML += `
      <div class="game-card">
        <div class="game-img-wrap">
          <img src="${g.img}" onerror="this.src='https://via.placeholder.com/400x180/111827/fff?text=NO+IMAGE'">
          <div class="game-badge">${g.category}</div>
        </div>
        <div class="game-info">
          <div class="game-name">${g.name}</div>
          <div class="game-desc">${g.description || ''}</div>
          ${linksHtml}
          ${settingHtml}
        </div>
      </div>
    `;
  });
});

// LOAD VIDEOS
function loadVideos(){
  db.ref('videos').on('value', snap => {
    const data = snap.val() || {};
    videosGrid.innerHTML = '';
    if(Object.keys(data).length === 0){
      videosGrid.innerHTML = '<p class="empty-msg">📺 Bado hakuna videos.</p>';
      return;
    }
    Object.values(data).reverse().forEach(v => {
      videosGrid.innerHTML += `
        <div class="video-card">
          <iframe src="https://www.youtube.com/embed/${v.videoId}" allowfullscreen></iframe>
          <div class="video-info">
            <div class="video-title">${v.title}</div>
            <div class="video-game">🎮 ${v.gameName}</div>
            <div class="video-desc">${v.description}</div>
          </div>
        </div>
      `;
    });
  });
}
</script>
</body>
</html>
