<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameZone Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOCK SCREEN -->
<div id="codeLock" class="lock-screen">
  <div class="lock-box neon-box">
    <h2>🔒 Access Code Inahitajika</h2>
    <p>Site imefungwa. Weka code ili uingie</p>
    <input type="text" id="siteCode" placeholder="Weka Access Code yako">
    <button id="unlockBtn" class="neon-btn">FUNGUA SITE</button>
    <p id="lockError" class="error hidden">❌ Code si sahihi au imetumika!</p>
  </div>
</div>

<!-- CONTENT YOTE -->
<div id="siteContent" class="hidden">
  <div class="bg-animation"></div>
  
  <header>
    <div class="logo">
      <span class="logo-icon">🎮</span>
      <h1>GameZone <span class="pro">PRO</span></h1>
    </div>
  </header>

  <div class="hero">
    <h2>Cheza Games Bora Kabisa</h2>
    <p>Bure kabisa. Cheza moja kwa moja</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('games')">🎮 Games</button>
    <button class="tab-btn" id="tutorialsTab" onclick="showTab('tutorials')" style="display:none">📹 Jinsi ya Kuset</button>
  </div>

  <div class="grid" id="gamesGrid"></div>
  <div class="grid hidden" id="tutorialsGrid"></div>
</div>

<script src="script.js"></script>
</body>
</html>
