<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENJOY GAMES</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Loading ENJOY GAMES...</p></div>

<!-- Login Screen -->
<div id="authScreen" class="hidden">
  <div class="glow"></div>
  <div class="auth-box">
    <h1>ENJOY GAMES</h1>
    <p>Ingia ili kuona games</p>
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn-primary" id="loginBtn">Login</button>
    <button class="btn-ghost" id="registerBtn">Jisajili</button>
  </div>
</div>

<!-- Main App -->
<div id="appScreen" class="hidden">
  <nav>
    <div class="logo">ENJOY<span>GAMES</span></div>
    <div class="nav-links">
      <a href="#" data-page="home" class="nav-link active">Home</a>
      <a href="#" data-page="apk" class="nav-link">APK</a>
      <a href="#" data-page="ppsspp" class="nav-link">PPSSPP Gold</a>
      <a href="#" data-page="ps2" class="nav-link">PS2</a>
      <a href="#" data-page="admin" class="nav-link admin-only hidden">Admin Upload</a>
    </div>
    <div class="nav-right">
      <span id="userEmail"></span>
      <button class="btn-sm" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main id="pageContent"></main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
