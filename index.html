<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMES STORE</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',Arial,sans-serif}

 .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:25px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.5)}
 .header h1{color:#4d9fff;font-size:32px;font-weight:bold;letter-spacing:1px;text-shadow:0 2px 10px rgba(77,159,255,0.4)}

 .tabs{display:flex;gap:10px;padding:15px;background:#0f0f1a;justify-content:center}
 .tab{padding:12px 35px;background:#1a1a2e;border-radius:12px;cursor:pointer;font-weight:bold;border:2px solid #2a2a4e;transition:0.3s;font-size:16px}
 .tab.active{background:linear-gradient(135deg,#4d9fff,#66b3ff);border-color:#4d9fff;color:#fff;box-shadow:0 4px 15px rgba(77,159,255,0.4)}

 .container{max-width:1100px;margin:25px auto;padding:0 15px}
 .hidden{display:none}

 .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:25px}

 .game-card{background:#1a1a2e;border-radius:20px;overflow:hidden;border:1px solid #2a2a4e;transition:0.4s;box-shadow:0 5px 20px rgba(0,0,0,0.3)}
 .game-card:hover{transform:translateY(-8px);box-shadow:0 15px 40px rgba(77,159,255,0.4)}

 .game-img-wrap{position:relative}
  /* PICHA IONEKANE - HII NDIO ILIKUWA HAIJAWASHA */
 .game-card img{width:100%;height:220px;object-fit:cover;background:#0a0a0f;display:block;border-bottom:2px solid #2a2a4e}

  /* CATEGORY BADGE JUU YA PICHA */
 .game-badge{position:absolute;top:12px;left:12px;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);padding:6px 14px;border-radius:25px;font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;border:1px solid rgba(255,255,255,0.1)}

 .game-info{padding:18px}
 .game-name{font-size:20px;font-weight:bold;color:#4d9fff;margin:10px 0;line-height:1.4}

  /* MAELEZO - HII ILIKUWA INAONYESHA undefined */
 .game-desc{color:#bbb;font-size:14px;margin:12px 0;line-height:1.6;min-height:45px}

  /* BUTTON ZA KISASA SANA - GRADIENT + ANIMATION */
 .download-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:linear-gradient(135deg,#ff3333,#ff6666);color:#fff;padding:16px;margin:10px 0;border-radius:12px;text-decoration:none;font-weight:bold;text-align:center;border:none;cursor:pointer;transition:0.3s;font-size:16px;box-shadow:0 5px 20px rgba(255,51,51,0.4);position:relative;overflow:hidden}
 .download-btn:before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:0.5s}
 .download-btn:hover:before{left:100%}
 .download-btn:hover{transform:scale(1.03);box-shadow:0 8px 25px rgba(255,51,51,0.6)}
 .download-btn:active{transform:scale(0.97)}

 .setting-box{margin-top:15px;padding:14px;background:linear-gradient(135deg,#0f1a0f,#1a2a1a);border-left:4px solid #00ff88;border-radius:10px;font-size:14px}
 .setting-box b{color:#00ff88;font-size:15px}

 .empty-msg{text-align:center;color:#666;padding:100px 20px;font-size:20px}

  @media(max-width:768px){
   .games-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎮 GAMES STORE</h1>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('games')">GAMES</div>
  <div class="tab" onclick="showTab('videos')">VIDEOS</div>
</div>

<div class="container">
  <div id="gamesTab">
    <div id="gamesGrid" class="games-grid">
      <p class="empty-msg">Inapakia games...</p>
    </div>
  </div>

  <div id="videosTab" class="hidden">
    <p class="empty-msg">Bado hakuna videos.</p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAyz_E70mm8RbYmWGYdBu1TLuBqK4ipdgU",
  authDomain: "nova-ec213.firebaseapp.com",
  databaseURL: "https://nova-ec213-default-rtdb.firebaseio.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "303745079224",
  appId: "1:303745079224:web:b8b6be511ac128a7202cc1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// PASSWORD
if(!localStorage.getItem('siteAccess')){
  const code = prompt('🔑 Weka Code ya Ku ingia Site:');
  db.ref('siteCodes/' + code).once('value', snap => {
    if(snap.exists()){
      localStorage.setItem('siteAccess', 'true');
      db.ref('usedCodes/' + code).set(true);
      db.ref('siteCodes/' + code).remove();
      location.reload();
    } else {
      alert('❌ Code si sahihi!');
      window.location = 'https://google.com';
    }
  });
}

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#gamesTab, #videosTab').forEach(t=>t.classList.add('hidden'));
  if(tab==='games'){
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('gamesTab').classList.remove('hidden');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('videosTab').classList.remove('hidden');
  }
}

const gamesGrid = document.getElementById('gamesGrid');

// LOAD GAMES - FIX KAMILI
db.ref('games').on('value', snap => {
  const data = snap.val() || {};
  gamesGrid.innerHTML = '';

  if(Object.keys(data).length === 0){
    gamesGrid.innerHTML = '<p class="empty-msg">📦 Hakuna games bado.</p>';
    return;
  }

  Object.entries(data).reverse().forEach(([id, g]) => {
    // BUTTONS ZA KISASA
    let linksHtml = '';
    if(g.links && g.links.length > 0){
      linksHtml = '<div style="margin-top:15px">';
      g.links.forEach(link => {
        linksHtml += `<a href="${link.url}" target="_blank" rel="noopener" class="download-btn">
          ⬇️ DOWNLOAD ${link.label.toUpperCase()}
        </a>`;
      });
      linksHtml += '</div>';
    }

    // PASSWORD
    let settingHtml = '';
    if(g.setting && g.setting.text && g.setting.text.trim()!== ''){
      settingHtml = `<div class="setting-box">
        <b>🔐 PASSWORD:</b> ${g.setting.text}
      </div>`;
    }

    gamesGrid.innerHTML += `
      <div class="game-card">
        <div class="game-img-wrap">
          <img src="${g.img}" alt="${g.name}" onerror="this.src='https://via.placeholder.com/400x220/1a1a2e/4d9fff?text=NO+IMAGE'">
          <div class="game-badge">${g.category}</div>
        </div>
        <div class="game-info">
          <div class="game-name">${g.name}</div>
          <div class="game-desc">${g.description || 'Hakuna maelezo'}</div>
          ${linksHtml}
          ${settingHtml}
        </div>
      </div>
    `;
  });
});
</script>
</body>
</html>
