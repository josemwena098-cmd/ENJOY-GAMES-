<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENJOY GAMES</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Loading ENJOY GAMES...</p>
</div>

<!-- Auth Screen -->
<div id="authScreen" class="hidden">
  <div class="glow"></div>
  <div class="auth-box">
    <h1>ENJOY GAMES</h1>
    <p id="authSub">Ingia kuendelea</p>
    
    <input type="email" id="email" placeholder="Email" autocomplete="email">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password">
    
    <button class="btn-primary" id="authBtn">Login</button>
    <button class="btn-ghost" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
      Continue with Google
    </button>
    
    <p class="switch">
      <span id="switchMode">Huna akaunti? Jisajili</span>
    </p>
  </div>
</div>

<!-- Main App -->
<div id="appScreen" class="hidden">
  <nav>
    <div class="logo">ENJOY<span>GAMES</span></div>
    <div class="nav-right">
      <span id="userEmail"></span>
      <button class="btn-sm" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <main>
    <section class="hero">
      <h1>Karibu, <span id="userName">Player</span>!</h1>
      <p>Chagua game uanze kucheza sasa hivi</p>
      <div class="stats">
        <div class="stat">
          <span class="dot"></span>
          <span id="onlineCount">0</span> Online
        </div>
      </div>
    </section>

    <section class="games-grid">
      <div class="game-card">
        <div class="game-icon">🎮</div>
        <h3>Action Games</h3>
        <p>Fast paced action</p>
      </div>
      <div class="game-card">
        <div class="game-icon">🏆</div>
        <h3>Tournaments</h3>
        <p>Win real prizes</p>
      </div>
      <div class="game-card">
        <div class="game-icon">👥</div>
        <h3>Multiplayer</h3>
        <p>Play with friends</p>
      </div>
    </section>
  </main>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
