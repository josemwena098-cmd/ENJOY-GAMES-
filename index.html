<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Hub</title>
<style>
html,body{height:100%;margin:0;padding:0}
body{
  background-image:url('https://i.postimg.cc/8zzwp3bp/IMG-20260415-WA0114.jpg');
  background-size:cover;background-position:center;background-attachment:fixed;
  color:#fff;font-family:Arial,sans-serif;min-height:100vh
}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:-1}

.login-wrap{min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.login-card{background:rgba(30,30,30,0.95);padding:32px;border-radius:12px;width:100%;max-width:380px;border:1px solid #444}
.login-card h2{text-align:center;margin-bottom:8px;color:#8ab4f8;font-size:24px}
.login-card p{text-align:center;color:#aaa;font-size:13px;margin-bottom:20px}
.login-card input{width:100%;padding:14px;margin-bottom:12px;background:#2d2d2d;border:1px solid #555;border-radius:8px;color:#e0e0e0;font-size:15px}
.login-card button{width:100%;padding:14px;background:#1a73e8;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:16px}
.toggle{color:#8ab4f8;text-align:center;margin-top:16px;font-size:14px;cursor:pointer;text-decoration:underline}
.msg{text-align:center;margin-top:12px;font-size:13px;min-height:20px}
.error{color:#ff6b6b}
.success{color:#51cf66}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <h2 id="title">Ingia Nova Hub</h2>
    <p id="subtitle">Pakua PS2, PPSSPP na APK</p>
    <input type="email" id="email" placeholder="Email yako" autocomplete="email">
    <input type="password" id="password" placeholder="Password angalau 6 herufi" autocomplete="current-password">
    <button onclick="handleAuth()" id="btn">Ingia</button>
    <div class="toggle" onclick="toggleMode()" id="toggle">Huna account? Bonyeza hapa Jisajili</div>
    <div id="msg" class="msg"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyD9SvoHhndN-j-Sl59qcdcDwHwB22UupvU",
  authDomain: "nova-ec213.firebaseapp.com",
  projectId: "nova-ec213",
  storageBucket: "nova-ec213.firebasestorage.app",
  messagingSenderId: "978338235926",
  appId: "1:978338235926:web:6193ea73d8fcc8ded89737"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
let isLogin = true;

window.toggleMode = ()=>{
  isLogin = !isLogin;
  document.getElementById('title').textContent = isLogin ? 'Ingia Nova Hub' : 'Jisajili Nova Hub';
  document.getElementById('btn').textContent = isLogin ? 'Ingia' : 'Jisajili Sasa';
  document.getElementById('toggle').textContent = isLogin ? 'Huna account? Bonyeza hapa Jisajili' : 'Una account? Bonyeza hapa Ingia';
  document.getElementById('msg').textContent = '';
  document.getElementById('msg').className = 'msg';
}

window.handleAuth = async ()=>{
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  
  if(!email || !password){
    msg.textContent = 'Jaza email na password';
    msg.className = 'msg error';
    return;
  }
  
  if(password.length < 6){
    msg.textContent = 'Password iwe na herufi 6+';
    msg.className = 'msg error';
    return;
  }
  
  msg.textContent = 'Tafadhali subiri...';
  msg.className = 'msg';
  
  try{
    if(isLogin){
      await signInWithEmailAndPassword(auth, email, password);
      msg.textContent = 'Umeingia! Unaelekezwa...';
      msg.className = 'msg success';
      setTimeout(()=>{window.location.href = window.location.href.replace('/EN','') + '?logged=in'}, 1000);
    }else{
      await createUserWithEmailAndPassword(auth, email, password);
      msg.textContent = 'Account imetengenezwa! Umeingia';
      msg.className = 'msg success';
      setTimeout(()=>{window.location.href = window.location.href.replace('/EN','') + '?logged=in'}, 1000);
    }
  }catch(err){
    console.log(err.code);
    if(err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'){
      msg.textContent = 'Email au password si sahihi. Jaribu Jisajili kama ni mara ya kwanza';
    }else if(err.code === 'auth/email-already-in-use'){
      msg.textContent = 'Email hii tayari imesajiliwa. Bonyeza Ingia';
    }else if(err.code === 'auth/weak-password'){
      msg.textContent = 'Password iwe na herufi 6 angalau';
    }else{
      msg.textContent = 'Kosa: ' + err.message;
    }
    msg.className = 'msg error';
  }
}
</script>
</body>
</html>
